name = "damp-block-c720"
main = "src/index.ts"
compatibility_date = "2025-09-27"
compatibility_flags = ["nodejs_compat"]

[assets]
binding = "ASSETS"
directory = "./public"

[observability]
enabled = true

# Durable Objects
[[durable_objects.bindings]]
name = "ROOM"
class_name = "GameRoom"

[[durable_objects.bindings]]
name = "MATCHMAKER"
class_name = "MatchMaker"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameRoom"]
new_classes = ["MatchMaker"]

# D1
[[d1_databases]]
binding = "mathiks_db"
database_name = "mathiks-db"
database_id = "1defe692-9700-4d02-94b9-49d8a6e98d39"
preview_database_id = "1defe692-9700-4d02-94b9-49d8a6e98d39"
migrations_dir = "./drizzle/migrations"

# Queues
[[queues.producers]]
binding = "mathiks_jobs"
queue = "mathiks-jobs"

[[queues.consumers]]
queue = "mathiks-jobs"

# Hyperdrive (Neon PostgreSQL connection pooling)
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "432028a0868947689575f188be8f59cf"

[vars]
DATABASE_URL = ""
BETTER_AUTH_URL = ""
FRONTEND_URL = ""
GOOGLE_CLIENT_ID = ""
GOOGLE_CLIENT_SECRET = ""
